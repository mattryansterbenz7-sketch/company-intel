<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="design-tokens.css">
  <title>Coop.ai — Inbox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--ci-bg-base); color: var(--ci-text-primary); height: 100vh; font-size: 14px; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Header ───────────────────────────────────────────────────────────── */
    .inbox-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--ci-bg-header); border-bottom: 2px solid #1a2c3a;
      padding: 10px 20px; display: flex; align-items: center; gap: 14px;
      height: 52px; flex-shrink: 0;
    }
    .hdr-back {
      color: var(--ci-text-tertiary); font-size: 12px; text-decoration: none; font-weight: 600;
      padding: 6px 12px; border: 1px solid #4a6580; border-radius: var(--ci-radius-sm);
      background: rgba(255,255,255,0.08); transition: all var(--ci-transition-fast); flex-shrink: 0;
      cursor: pointer;
    }
    .hdr-back:hover { color: var(--ci-text-on-dark); border-color: var(--ci-text-tertiary); }
    .hdr-divider { width: 1px; height: 24px; background: #4a6580; flex-shrink: 0; }
    .hdr-title { font-size: 15px; font-weight: 700; color: var(--ci-text-on-dark); flex-shrink: 0; }
    .hdr-title span { color: var(--ci-accent-primary); }
    .hdr-stats { font-size: 11px; color: var(--ci-text-on-dark-muted); margin-left: 8px; }
    .hdr-spacer { flex: 1; }
    .hdr-refresh-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--ci-text-on-dark-muted);
      font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: 5px;
      cursor: pointer; font-family: inherit;
      transition: all var(--motion-xs);
    }
    .hdr-refresh-btn:hover { background: rgba(255,255,255,0.08); color: var(--ci-text-on-dark); }
    .hdr-refresh-btn:disabled { opacity: 0.55; cursor: default; }
    .refresh-icon { display: inline-block; font-size: 13px; line-height: 1; }
    .hdr-refresh-btn.spinning .refresh-icon { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Layout ───────────────────────────────────────────────────────────── */
    .inbox-body { display: flex; flex: 1; min-height: 0; }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */
    .inbox-sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--ci-bg-base);
      border-right: 1px solid var(--ci-border-subtle);
      padding: 14px 0;
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .sb-all {
      padding: 6px 16px;
      font-size: 13px; font-weight: 600;
      color: var(--ci-text-primary);
      cursor: pointer;
      border-left: 2px solid transparent;
      display: flex; align-items: center; justify-content: space-between;
      transition: background var(--motion-xs);
    }
    .sb-all:hover { background: var(--ci-bg-raised); }
    .sb-all.active { background: var(--ci-bg-raised); border-left-color: var(--ci-accent-primary); }
    .sb-all .unread-count { font-size: 11px; font-weight: 700; color: var(--ci-accent-primary); }

    .sb-section { margin-top: 16px; }
    .sb-section-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 16px;
      font-size: 10px; font-weight: 700; color: var(--ci-text-tertiary);
      text-transform: uppercase; letter-spacing: 0.06em;
      cursor: pointer; user-select: none;
      transition: color var(--motion-xs);
    }
    .sb-section-head:hover { color: var(--ci-text-secondary); }
    .sb-section-head .caret { font-size: 8px; opacity: 0.6; }

    .sb-item {
      position: relative;
      display: flex; align-items: center; gap: 9px;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--ci-text-secondary);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background var(--motion-xs), border-color var(--motion-xs), color var(--motion-xs);
    }
    .sb-item:hover { background: var(--ci-bg-raised); color: var(--ci-text-primary); }
    .sb-item.active { background: var(--ci-bg-raised); border-left-color: var(--ci-accent-primary); color: var(--ci-text-primary); font-weight: 600; }
    .sb-item .unread-dot { position: absolute; left: 7px; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; border-radius: 50%; background: var(--ci-accent-primary); display: none; }
    .sb-item.unread .unread-dot { display: block; }
    .sb-item.unread .sb-item-count { color: var(--ci-accent-primary); font-weight: 700; }
    .sb-item-logo {
      width: 20px; height: 20px; border-radius: var(--ci-radius-sm); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
    }
    .sb-item-logo-wrap { position: relative; overflow: hidden; }
    .sb-item-logo-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #fff; display: block; z-index: 1; }
    .sb-item-logo-wrap .sb-item-logo-initials { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 700; z-index: 0; border-radius: inherit; }
    .sb-item-logo-wrap.sb-logo-fallback .sb-item-logo-initials { z-index: 2; }
    .sb-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sb-item-count { font-size: 11px; font-weight: 600; color: var(--ci-text-tertiary); flex-shrink: 0; }

    /* ── List column ──────────────────────────────────────────────────────── */
    .inbox-list {
      flex: 1; min-width: 360px; max-width: 460px;
      overflow: hidden;
      background: var(--ci-bg-base);
      border-right: 1px solid var(--ci-border-subtle);
      display: flex; flex-direction: column;
    }

    /* List head */
    .list-head {
      padding: 14px 16px 10px; border-bottom: 1px solid var(--ci-border-subtle);
      background: var(--ci-bg-raised); flex-shrink: 0;
    }
    .list-head-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .list-title { font-size: 15px; font-weight: 700; letter-spacing: -0.005em; }
    .list-count { font-size: 12px; color: var(--ci-text-tertiary); font-weight: 500; }
    .list-mark-all {
      margin-left: auto; font-size: 12px; color: var(--ci-text-secondary);
      background: transparent; border: none; cursor: pointer; padding: 4px 6px;
      border-radius: 4px; font-family: inherit;
    }
    .list-mark-all:hover { background: var(--ci-bg-inset); color: var(--ci-text-primary); }

    .list-controls { display: flex; align-items: center; gap: 6px; }
    .list-search {
      flex: 1; font-size: 13px; padding: 6px 10px;
      background: var(--ci-bg-base); border: 1px solid var(--ci-border-default);
      border-radius: var(--ci-radius-sm); color: var(--ci-text-primary); font-family: inherit;
    }
    .list-search:focus { outline: none; border-color: var(--ci-accent-primary); box-shadow: 0 0 0 2px var(--ci-accent-primary-soft); }
    .list-search::placeholder { color: var(--ci-text-tertiary); }

    /* Stage filter dropdown */
    .list-filter-wrap { position: relative; }
    .list-filter {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 500; padding: 6px 10px;
      background: var(--ci-bg-base); border: 1px solid var(--ci-border-default);
      border-radius: var(--ci-radius-sm); color: var(--ci-text-primary);
      cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: all var(--motion-xs);
    }
    .list-filter:hover { background: var(--ci-bg-inset); }
    .list-filter.open { border-color: var(--ci-accent-primary); box-shadow: 0 0 0 2px var(--ci-accent-primary-soft); }
    .list-filter.filtered { border-color: var(--ci-accent-primary); color: var(--ci-accent-primary); background: var(--ci-accent-primary-soft); }
    .list-filter .caret { font-size: 8px; color: var(--ci-text-tertiary); transition: transform var(--motion-xs); }
    .list-filter.open .caret { transform: rotate(180deg); }

    .list-filter-menu {
      display: none; position: fixed;
      background: var(--ci-bg-overlay); border: 1px solid var(--ci-border-default);
      border-radius: var(--ci-radius-md); box-shadow: 0 8px 30px rgba(0,0,0,0.13);
      z-index: 10001; min-width: 180px; padding: 6px 0;
    }
    .list-filter-menu.open { display: block; }
    .list-filter-opt {
      display: flex; align-items: center; padding: 9px 16px;
      font-size: 13px; font-weight: 500; color: var(--ci-text-primary);
      cursor: pointer; transition: background 0.1s; user-select: none; position: relative;
    }
    .list-filter-opt:hover { background: var(--ci-bg-inset); }
    .list-filter-opt.active { font-weight: 600; }
    .list-filter-opt.active::after { content: '✓'; position: absolute; right: 16px; font-size: 12px; color: var(--ci-accent-primary); }

    .list-tabs { display: flex; gap: 2px; margin-top: 12px; }
    .list-tab {
      font-size: 12px; font-weight: 500; padding: 5px 12px;
      border-radius: var(--ci-radius-sm); color: var(--ci-text-tertiary);
      cursor: pointer; transition: all var(--motion-xs);
    }
    .list-tab:hover { color: var(--ci-text-primary); }
    .list-tab.active { color: var(--ci-text-primary); background: var(--ci-bg-inset); font-weight: 600; }

    /* List body + email rows */
    .list-body { overflow-y: auto; flex: 1; }

    .date-group {
      padding: 10px 16px 6px;
      font-size: 10px; font-weight: 600; color: var(--ci-text-tertiary);
      letter-spacing: 0.06em; text-transform: uppercase;
      background: var(--ci-bg-raised);
      position: sticky; top: 0; z-index: 1;
    }

    .email-row {
      display: grid; grid-template-columns: 28px 1fr 60px;
      gap: 10px;
      padding: 10px 16px 10px 12px;
      cursor: pointer;
      border-left: 2px solid transparent;
      border-bottom: 1px solid var(--ci-border-subtle);
      transition: background var(--motion-xs);
      align-items: center;
      position: relative;
    }
    .email-row:hover { background: var(--ci-bg-inset); }
    .email-row.active { background: var(--ci-accent-primary-soft); border-left-color: var(--ci-accent-primary); }
    .email-row.unread::before { content: ''; position: absolute; left: 2px; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; border-radius: 50%; background: var(--ci-accent-primary); }

    /* Sender avatar with photo layer */
    .email-avatar {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 10px; font-weight: 700;
    }
    .email-avatar.email-avatar-photo { position: relative; overflow: hidden; }
    .email-avatar.email-avatar-photo img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; z-index: 1; }
    .email-avatar.email-avatar-photo .email-avatar-initials { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 700; z-index: 0; }
    .email-avatar.email-avatar-fallback .email-avatar-initials { z-index: 2; }

    .email-body { min-width: 0; }
    .email-row-head { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
    .email-from { font-size: 13px; font-weight: 600; color: var(--ci-text-primary); flex-shrink: 0; }
    .email-row.read .email-from { font-weight: 500; color: var(--ci-text-secondary); }
    .email-sep { font-size: 13px; color: var(--ci-text-tertiary); flex-shrink: 0; }
    .email-subject { font-size: 13px; color: var(--ci-text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .email-row.unread .email-subject { color: var(--ci-text-primary); }
    .email-row-sub { display: flex; align-items: center; gap: 8px; margin-top: 2px; font-size: 12px; color: var(--ci-text-tertiary); }
    .email-preview { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .email-company-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 600; color: var(--ci-text-tertiary);
      padding: 1px 6px; background: var(--ci-bg-inset); border-radius: 3px; flex-shrink: 0;
    }
    .email-company-tag-logo { width: 12px; height: 12px; border-radius: 2px; object-fit: contain; background: #fff; flex-shrink: 0; }
    .email-time { font-size: 11px; color: var(--ci-text-tertiary); text-align: right; flex-shrink: 0; align-self: start; margin-top: 2px; }
    .email-row.unread .email-time { color: var(--ci-accent-primary); font-weight: 600; }

    /* ── Detail pane ──────────────────────────────────────────────────────── */
    .inbox-detail {
      flex: 1.1; min-width: 480px; background: var(--ci-bg-raised);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .inbox-detail.empty { display: flex; align-items: center; justify-content: center; }
    .detail-empty { text-align: center; color: var(--ci-text-tertiary); font-size: 14px; padding: 60px 40px; max-width: 360px; }
    .detail-empty-icon { font-size: 56px; margin-bottom: 18px; opacity: 0.22; }
    .detail-empty-title { font-size: 16px; font-weight: 700; color: var(--ci-text-secondary); margin-bottom: 6px; }
    .detail-empty-hint { font-size: 12px; color: var(--ci-text-tertiary); line-height: 1.5; }
    .detail-empty-hint kbd {
      display: inline-block; padding: 1px 6px; font-size: 10px;
      font-family: ui-monospace, Menlo, monospace;
      background: var(--ci-bg-inset); border: 1px solid var(--ci-border-default);
      border-radius: 4px; color: var(--ci-text-secondary); margin: 0 1px;
    }

    .detail-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    .detail-head { padding: 22px 28px 16px; border-bottom: 1px solid var(--ci-border-subtle); flex-shrink: 0; }
    .detail-subject { font-size: 20px; font-weight: 700; line-height: 1.3; color: var(--ci-text-primary); letter-spacing: -0.01em; margin-bottom: 12px; }
    .detail-from-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }

    /* Detail avatar with photo layer */
    .detail-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 13px; font-weight: 700;
    }
    .detail-avatar.email-avatar-photo { position: relative; overflow: hidden; }
    .detail-avatar.email-avatar-photo img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; z-index: 1; }
    .detail-avatar.email-avatar-photo .email-avatar-initials { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; z-index: 0; }
    .detail-avatar.email-avatar-fallback .email-avatar-initials { z-index: 2; }

    .detail-from-body { flex: 1; min-width: 0; }
    .detail-from-name { font-size: 14px; font-weight: 600; color: var(--ci-text-primary); }
    .detail-from-meta { font-size: 12px; color: var(--ci-text-tertiary); margin-top: 1px; }
    .detail-date { font-size: 12px; color: var(--ci-text-tertiary); align-self: flex-start; flex-shrink: 0; padding-top: 4px; }
    .detail-tags-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .detail-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: var(--ci-bg-inset); color: var(--ci-text-secondary); display: inline-flex; align-items: center; gap: 4px; }
    .detail-tag.stage { background: rgba(69,115,210,0.08); color: var(--ci-accent-blue); }
    .detail-tag.company { background: rgba(54,179,126,0.08); color: #1B7E53; }
    .detail-tag-logo { width: 12px; height: 12px; border-radius: 2px; object-fit: contain; background: #fff; flex-shrink: 0; }

    .detail-body {
      padding: 22px 28px; font-size: 14px; line-height: 1.65; color: var(--ci-text-primary);
      white-space: pre-wrap; word-break: break-word; max-width: 720px; flex: 1;
    }

    /* Thread messages */
    .thread-count-bar {
      padding: 10px 28px; font-size: 11px; font-weight: 700; color: var(--ci-text-tertiary);
      background: var(--ci-bg-inset); border-bottom: 1px solid var(--ci-border-default);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .thread-msg { padding: 16px 28px; border-bottom: 1px solid var(--ci-border-subtle); transition: background var(--ci-transition-fast); }
    .thread-msg:last-child { border-bottom: none; }
    .thread-msg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .thread-msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .thread-msg-from { font-size: 12px; font-weight: 700; color: var(--ci-text-primary); flex: 1; }
    .thread-msg-date { font-size: 11px; color: var(--ci-text-tertiary); font-weight: 500; }
    .thread-msg-body { font-size: 14px; line-height: 1.65; color: var(--ci-text-primary); white-space: pre-wrap; word-wrap: break-word; padding-left: 38px; max-width: 720px; }
    .thread-msg.collapsed { background: var(--ci-bg-inset); cursor: pointer; }
    .thread-msg.collapsed:hover { background: var(--ci-border-default); }
    .thread-msg.collapsed .thread-msg-body { display: none; }
    .thread-msg.collapsed .thread-msg-header { margin-bottom: 0; opacity: 0.7; }
    .thread-msg-chevron { color: var(--ci-text-tertiary); font-size: 10px; transition: transform var(--ci-transition-fast); }
    .thread-msg.collapsed .thread-msg-chevron { transform: rotate(-90deg); }

    /* Detail actions — sticky at bottom */
    .detail-actions {
      position: sticky; bottom: 0;
      background: linear-gradient(to top, var(--ci-bg-raised) 60%, rgba(255,255,255,0));
      padding: 12px 28px 18px;
      display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0;
    }
    .action-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500; padding: 6px 12px;
      background: var(--ci-bg-raised); border: 1px solid var(--ci-border-default);
      border-radius: var(--ci-radius-sm); color: var(--ci-text-secondary);
      cursor: pointer; font-family: inherit;
      transition: all var(--motion-xs); text-decoration: none;
    }
    .action-btn:hover { background: var(--ci-bg-inset); color: var(--ci-text-primary); border-color: var(--ci-border-strong); }
    .action-btn.primary { background: var(--ci-text-primary); color: #fff; border-color: var(--ci-text-primary); }
    .action-btn.primary:hover { background: var(--ci-bg-header); }
    .action-btn.danger { color: var(--ci-text-tertiary); border-color: var(--ci-border-subtle); }
    .action-btn.danger:hover { color: #ef4444; border-color: #ef4444; background: rgba(239,68,68,0.06); }

    /* Empty state for list */
    .inbox-empty { display: flex; align-items: center; justify-content: center; flex: 1; }
    .inbox-empty-content { text-align: center; color: var(--ci-text-tertiary); max-width: 300px; }
    .inbox-empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.25; }
    .inbox-empty-title { font-size: 16px; font-weight: 700; color: var(--ci-text-secondary); margin-bottom: 8px; }
    .inbox-empty-text { font-size: 13px; line-height: 1.5; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--ci-border-default); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ci-border-strong); }
  </style>
</head>
<body>
  <div class="inbox-header">
    <a class="hdr-back" id="back-btn">← Pipeline</a>
    <div class="hdr-divider"></div>
    <div class="hdr-title">Coop<span>.ai</span> · Inbox</div>
    <div class="hdr-stats" id="inbox-stats"></div>
    <div class="hdr-spacer"></div>
    <button class="hdr-refresh-btn" id="inbox-refresh-btn"><span class="refresh-icon">↻</span><span class="refresh-label">Refresh</span></button>
  </div>
  <div class="inbox-body">
    <div class="inbox-sidebar" id="inbox-sidebar"></div>
    <div class="inbox-list" id="inbox-list">
      <div class="list-head" id="list-head">
        <div class="list-head-row">
          <div class="list-title" id="list-title">All Mail</div>
          <div class="list-count" id="list-count"></div>
          <button class="list-mark-all" id="list-mark-all">Mark all read</button>
        </div>
        <div class="list-controls">
          <input class="list-search" id="inbox-search" type="text" placeholder="Search emails by sender, subject, or body…">
          <div class="list-filter-wrap">
            <button class="list-filter" id="list-filter-btn">
              <span id="list-filter-label">Active</span>
              <span class="caret">▾</span>
            </button>
            <div class="list-filter-menu" id="list-filter-menu"></div>
          </div>
        </div>
        <div class="list-tabs">
          <div class="list-tab active" data-tab="all">All Mail</div>
          <div class="list-tab" data-tab="inbound">Inbox</div>
          <div class="list-tab" data-tab="outbound">Sent</div>
        </div>
      </div>
      <div class="list-body" id="inbox-list-body"></div>
    </div>
    <div class="inbox-detail empty" id="inbox-detail">
      <div class="detail-empty">
        <div class="detail-empty-icon">✉</div>
        <div class="detail-empty-title">No email selected</div>
        <div class="detail-empty-hint">Click any email on the left, or use <kbd>J</kbd> <kbd>K</kbd> to navigate.</div>
      </div>
    </div>
  </div>
  <script src="ui-utils.js"></script>
  <script src="navigate.js"></script>
  <script src="inbox.js"></script>
</body>
</html>
