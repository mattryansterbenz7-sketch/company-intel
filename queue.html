<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="design-tokens.css">
  <title>Coop.ai — Scoring Queue</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--ci-font-family); background: var(--ci-bg-base); color: var(--ci-text-primary); min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header {
      background: var(--ci-bg-header); color: var(--ci-text-on-dark); padding: 14px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .header-back {
      color: var(--ci-text-on-dark-muted); text-decoration: none; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px; transition: color 0.15s;
    }
    .header-back:hover { color: var(--ci-text-on-dark); }
    .header-title { font-size: 16px; font-weight: 700; }
    .header-title span { color: var(--ci-accent-primary); }
    .header-count {
      margin-left: auto; font-size: 13px; color: var(--ci-text-on-dark-muted);
      background: rgba(255,255,255,0.08); padding: 4px 12px; border-radius: var(--ci-radius-full);
    }

    /* Main */
    .queue-main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 24px 32px; }
    .queue-empty {
      text-align: center; padding: 60px 24px; max-width: 400px;
    }
    .queue-empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .queue-empty-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .queue-empty-sub { font-size: 14px; color: var(--ci-text-secondary); }

    /* Card shell: holds the card + flanking side-nav arrows */
    .queue-card-shell {
      position: relative; width: 100%; max-width: 960px;
    }

    /* Side nav arrows: positioned OUTSIDE the card on left/right, vertically centered */
    .queue-side-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px; border-radius: var(--ci-radius-full);
      background: var(--ci-bg-raised); border: 1px solid var(--ci-border-default);
      color: var(--ci-text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 400; line-height: 1;
      box-shadow: var(--ci-shadow-sm);
      transition: all 0.15s; z-index: 5;
    }
    .queue-side-nav:hover:not(:disabled) {
      border-color: var(--ci-accent-primary); color: var(--ci-accent-primary);
      background: var(--ci-accent-primary-soft);
      box-shadow: var(--ci-shadow-md);
      transform: translateY(-50%) scale(1.05);
    }
    .queue-side-nav:disabled { opacity: 0.3; cursor: default; }
    .queue-side-nav.prev { left: -68px; }
    .queue-side-nav.next { right: -68px; }

    /* On narrow screens where there's no room outside the card, tuck the arrows inside the edges */
    @media (max-width: 1280px) {
      .queue-side-nav.prev { left: 12px; }
      .queue-side-nav.next { right: 12px; }
      .queue-side-nav { background: rgba(255,255,255,0.92); backdrop-filter: blur(6px); }
    }

    /* Card */
    .queue-card {
      width: 100%; max-width: 960px; background: var(--ci-bg-raised);
      border: 1px solid var(--ci-border-default); border-radius: var(--ci-radius-lg);
      box-shadow: var(--ci-shadow-md); overflow: hidden;
      animation: cardIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Card header */
    .qc-header { padding: 14px 20px 10px; display: flex; gap: 14px; align-items: flex-start; }
    .qc-score {
      width: 48px; height: 48px; border-radius: var(--ci-radius-full);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-weight: 800; flex-shrink: 0; border: 3px solid;
    }
    .qc-score.green { border-color: #36B37E; color: #0F6E56; background: rgba(54,179,126,0.08); }
    .qc-score.amber { border-color: #F5A623; color: #854F0B; background: rgba(245,166,35,0.08); }
    .qc-score.red { border-color: #E8384F; color: #A32D2D; background: rgba(232,56,79,0.06); }
    .qc-score-num { font-size: 18px; line-height: 1; }
    .qc-score-den { font-size: 9px; opacity: 0.6; }
    .qc-score-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
    .qc-score-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ci-text-tertiary); }
    .qc-info { flex: 1; min-width: 0; }
    .qc-facts { flex-shrink: 0; min-width: 260px; max-width: 320px; }
    .qc-facts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
    .qc-fact-row { display: flex; flex-direction: column; gap: 1px; }
    .qc-fact-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ci-text-tertiary); }
    .qc-fact-val { font-size: 12px; color: var(--ci-text-primary); line-height: 1.35; font-weight: 500; }
    .qc-fact-val.unknown { color: var(--ci-text-tertiary); font-weight: 400; }
    .qc-facts-correct { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--ci-border); }
    .qc-facts-correct-toggle { font-size: 11px; color: var(--ci-text-tertiary); background: none; border: none; padding: 0; cursor: pointer; text-decoration: underline; text-decoration-style: dotted; }
    .qc-facts-correct-toggle:hover { color: var(--ci-text-secondary); }
    .qc-company { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .qc-company-favicon { width: 18px; height: 18px; border-radius: 3px; }
    .qc-title { font-size: 13px; color: var(--ci-text-secondary); margin-top: 1px; }
    .qc-meta { font-size: 12px; color: var(--ci-text-tertiary); margin-top: 3px; display: flex; gap: 6px; flex-wrap: wrap; }
    .qc-meta-chip {
      background: var(--ci-bg-inset); padding: 2px 8px; border-radius: var(--ci-radius-full);
      font-size: 11px; font-weight: 600;
    }

    /* Card body */
    .qc-body { padding: 0 16px 8px; }
    .qc-summary { font-size: 13px; color: var(--ci-text-secondary); line-height: 1.55; font-style: italic; padding: 12px 16px; background: var(--ci-bg-inset); border-radius: var(--ci-radius-sm); margin-bottom: 16px; }
    .qc-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ci-text-tertiary); margin-bottom: 8px; }

    /* Flags */
    .qc-flags { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
    .qc-flag-col { display: flex; flex-direction: column; gap: 6px; }
    .qc-flag-heading { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .qc-flag-heading.green { color: var(--ci-accent-teal); }
    .qc-flag-heading.red { color: var(--ci-accent-red); }
    .qc-flag { font-size: 12px; line-height: 1.4; color: var(--ci-text-secondary); display: flex; gap: 4px; flex-direction: column; }
    .qc-flag-row { display: flex; gap: 6px; align-items: flex-start; }
    .qc-flag-dot { flex-shrink: 0; margin-top: 2px; }
    .qc-flag-info-btn { flex-shrink: 0; background: none; border: none; padding: 0 2px; font-size: 11px; color: var(--ci-text-tertiary); cursor: pointer; line-height: 1; margin-top: 1px; opacity: 0.6; transition: opacity 0.15s; }
    .qc-flag-info-btn:hover, .qc-flag-info-btn.active { opacity: 1; color: var(--ci-accent-orange); }
    .qc-flag-detail { margin-left: 14px; margin-top: 4px; background: var(--ci-bg-inset); border: 1px solid var(--ci-border); border-radius: 6px; padding: 8px 10px; display: flex; flex-direction: column; gap: 5px; }
    .qc-detail-row { display: flex; flex-direction: column; gap: 2px; }
    .qc-detail-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ci-text-tertiary); }
    .qc-detail-val { font-size: 11px; color: var(--ci-text-secondary); line-height: 1.4; }
    .qc-detail-quote { font-style: italic; color: var(--ci-text-tertiary); }
    .qc-detail-link { font-size: 11px; font-weight: 600; color: var(--ci-accent-orange); text-decoration: none; margin-top: 2px; }

    /* Qualification */
    .qc-qual { margin-bottom: 16px; }
    .qc-qual-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .qc-qual-header .qc-section-label { margin-bottom: 0; }
    .qc-qual-text { font-size: 13px; color: var(--ci-text-secondary); line-height: 1.5; }
    .qc-qual-score { display: inline-flex; align-items: center; font-size: 15px; font-weight: 700; padding: 3px 10px; border-radius: var(--ci-radius-full); }
    .qc-qual-score.high { background: rgba(54,179,126,0.12); color: #0F6E56; }
    .qc-qual-score.mid { background: rgba(245,166,35,0.12); color: #854F0B; }
    .qc-qual-score.low { background: rgba(232,56,79,0.1); color: #A32D2D; }

    /* Stage header — outside / above the card */
    .qc-stage-header {
      display: flex; align-items: center; gap: 10px; padding: 0 4px 12px;
    }
    .qc-stage-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 2px rgba(255,255,255,0.5); }
    .qc-stage-label {
      font-size: 15px; font-weight: 800; letter-spacing: 0.01em;
      color: var(--ci-text-primary); text-shadow: 0 1px 3px rgba(0,0,0,0.06);
    }
    .qc-action-badge { font-size: 12px; font-weight: 600; margin-left: auto; }

    /* Pipeline context block */
    .qc-pipeline-ctx { margin-bottom: 10px; padding: 9px 12px; background: var(--ci-bg-inset); border: 1px solid var(--ci-border-subtle); border-radius: var(--ci-radius-sm); display: flex; flex-direction: column; gap: 6px; }
    .qc-pipeline-ctx-stage { display: flex; align-items: center; gap: 7px; }
    .qc-pipeline-ctx-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .qc-pipeline-ctx-stage-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .qc-pipeline-ctx-action { font-size: 11px; font-weight: 600; margin-left: auto; }
    .qc-pipeline-ctx-rows { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
    .qc-pipeline-ctx-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; }
    .qc-pipeline-ctx-key { color: var(--ci-text-tertiary); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; min-width: 96px; flex-shrink: 0; }
    .qc-pipeline-ctx-val { color: var(--ci-text-secondary); line-height: 1.4; }
    .qc-pipeline-ctx-val.overdue { color: var(--ci-accent-red); font-weight: 600; }

    /* Pipeline context inputs */
    .qc-pipeline-ctx-row:first-child { grid-column: 1 / -1; }
    .qc-nextstep-input { flex: 1; min-width: 0; font-size: 11.5px; font-family: inherit; padding: 2px 7px; border: 1px solid var(--ci-border-subtle); border-radius: 4px; background: var(--ci-bg-raised); color: var(--ci-text-primary); }
    .qc-nextstep-input:focus { border-color: var(--ci-accent-primary); outline: none; }
    .qc-date-input { font-size: 11.5px; font-family: inherit; padding: 2px 6px; border: 1px solid var(--ci-border-subtle); border-radius: 4px; background: var(--ci-bg-raised); color: var(--ci-text-primary); }
    .qc-date-input:focus { border-color: var(--ci-accent-primary); outline: none; }
    .qc-date-input.overdue { border-color: var(--ci-accent-red); color: var(--ci-accent-red); background: rgba(232,56,79,0.04); }
    .qc-action-select { font-size: 11.5px; padding: 2px 6px; border: 1px solid var(--ci-border-subtle); border-radius: 4px; background: var(--ci-bg-raised); font-family: inherit; color: var(--ci-text-primary); }
    .qc-action-select:focus { border-color: var(--ci-accent-primary); outline: none; }

    /* Tasks row inside pipeline ctx */
    .qc-tasks-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; padding-top: 6px; border-top: 1px solid var(--ci-border-subtle); }
    .qc-task-chip { font-size: 11px; padding: 2px 9px; border-radius: 10px; background: rgba(99,102,241,0.08); color: #4338ca; border: 0.5px solid rgba(99,102,241,0.2); font-weight: 500; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .qc-task-chip.overdue { background: rgba(232,56,79,0.08); color: #A32D2D; border-color: rgba(232,56,79,0.2); }

    /* Interactive task section */
    .smt-section { border-top: 1px solid #f0eeeb; padding: 12px 20px 10px; }
    .smt-header { display:flex; align-items:center; gap:6px; cursor:pointer; padding:2px 0; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:#A09A94; user-select:none; }
    .smt-header:hover { color: #6B6560; }
    .smt-chevron { font-size:9px; transition:transform 0.15s; }
    .smt-chevron.open { transform:rotate(90deg); }
    .smt-count { font-weight:600; font-size:10px; color:var(--ci-accent-primary); }
    .smt-body { padding-top:8px; display:flex; flex-direction:column; gap:5px; }
    .smt-item { display:flex; align-items:flex-start; gap:10px; padding:8px 10px; background:#fafaf8; border:1px solid #ECE7E1; border-radius:8px; font-size:12px; transition:all 0.12s; }
    .smt-item:hover { border-color:#d4cfc9; background:#f5f4f1; }
    .smt-item:hover .smt-del { opacity:1; }
    .smt-item.smt-done { opacity:0.4; }
    .smt-item.smt-done .smt-text { text-decoration:line-through; }
    .smt-check { width:17px; height:17px; border-radius:50%; border:2px solid #c4c0bc; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; font-size:10px; color:transparent; transition:all 0.12s; }
    .smt-check:hover { border-color:var(--ci-accent-primary); background:rgba(255,122,89,0.06); }
    .smt-check.checked { border-color:#86efac; color:#16a34a; background:#f0fdf4; }
    .smt-text { flex:1; font-weight:600; color:#33475b; line-height:1.45; }
    .smt-priority { font-size:9px; font-weight:700; text-transform:uppercase; padding:2px 6px; border-radius:4px; white-space:nowrap; line-height:1.3; letter-spacing:0.03em; }
    .smt-date { font-size:10px; font-weight:600; white-space:nowrap; }
    .smt-del { background:none; border:none; cursor:pointer; font-size:14px; color:#c4c0bc; opacity:0; padding:0 2px; flex-shrink:0; transition:opacity 0.1s; }
    .smt-del:hover { color:var(--ci-accent-red, #f87171); }
    .smt-add { display:flex; gap:6px; align-items:center; padding:8px 0 2px; margin-top:4px; border-top:1px solid #f0eeeb; }
    .smt-add input[type="text"] { flex:1; font-size:12px; padding:6px 10px; border:1px solid #E0DDD8; border-radius:8px; outline:none; font-family:inherit; background:#fff; color:var(--ci-text-primary); transition:border-color 0.12s; }
    .smt-add input[type="text"]:focus { border-color:var(--ci-accent-primary); box-shadow:0 0 0 2px rgba(255,122,89,0.1); }
    .smt-add select, .smt-add input[type="date"] { font-size:11px; padding:5px 8px; border:1px solid #E0DDD8; border-radius:8px; outline:none; font-family:inherit; background:#fff; color:var(--ci-text-secondary); transition:border-color 0.12s; }
    .smt-add select:focus, .smt-add input[type="date"]:focus { border-color:var(--ci-accent-primary); }
    .smt-add-btn { font-size:11px; font-weight:700; padding:6px 14px; border:none; border-radius:8px; background:var(--ci-accent-primary); color:#fff; cursor:pointer; font-family:inherit; white-space:nowrap; transition:all 0.12s; }
    .smt-add-btn:hover { opacity:0.9; box-shadow:0 2px 6px rgba(255,122,89,0.25); }
    .smt-add-btn:hover { opacity:0.9; }

    /* Coop's Quick Take banner (merged take + role brief) */
    .queue-coop-take { display: flex; flex-direction: column; gap: 6px; padding: 8px 12px; background: var(--ci-bg-inset); border-left: 3px solid #FF7A59; border-radius: 0 var(--ci-radius-sm) var(--ci-radius-sm) 0; margin-bottom: 10px; }
    .queue-coop-take-main { display: flex; align-items: flex-start; gap: 8px; }
    .queue-coop-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #FF7A59; white-space: nowrap; padding-top: 1px; }
    .queue-coop-text { font-size: 12px; color: var(--ci-text-secondary); line-height: 1.45; font-style: italic; }
    .queue-coop-brief-rows { display: flex; flex-direction: column; gap: 3px; padding-top: 5px; border-top: 1px solid var(--ci-border-subtle); }
    .queue-coop-brief-row { font-size: 11.5px; line-height: 1.5; color: var(--ci-text-secondary); }
    .qcbr-pos { color: #059669; font-weight: 600; }
    .qcbr-neg { color: #dc2626; font-weight: 600; }
    .qcbr-neutral { font-weight: 600; color: var(--ci-text-primary); }

    /* Verdict pill */
    .queue-verdict-pill { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: var(--ci-radius-full); margin-bottom: 5px; }
    .queue-verdict-pill.high { background: rgba(54,179,126,0.12); color: #0F6E56; }
    .queue-verdict-pill.mid { background: rgba(245,166,35,0.12); color: #854F0B; }
    .queue-verdict-pill.possible { background: rgba(155,110,60,0.10); color: #7A5A30; }
    .queue-verdict-pill.mixed { background: rgba(155,110,60,0.10); color: #7A5A30; }
    .queue-verdict-pill.low { background: rgba(232,56,79,0.10); color: #A32D2D; }

    /* Score breakdown section */
    .qc-breakdown { display: flex; flex-direction: column; gap: 0; margin-bottom: 4px; }
    .qc-breakdown-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ci-text-secondary); margin-bottom: 4px; }

    /* Overview bar rows */
    .qc-breakdown .queue-dim-bar-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; cursor: pointer; user-select: none; transition: background 0.12s; border-radius: 4px; }
    .qc-breakdown .queue-dim-bar-row:hover { background: var(--ci-bg-inset); }
    .queue-dim-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .queue-dim-dot.qual { background: #378ADD; }
    .queue-dim-dot.role { background: #3B6D11; }
    .queue-dim-dot.culture { background: #7F77DD; }
    .queue-dim-dot.company { background: #BA7517; }
    .queue-dim-dot.comp { background: #0F6E56; }
    .queue-dim-name { font-size: 11px; color: var(--ci-text-primary); width: 80px; flex-shrink: 0; font-weight: 600; }
    .queue-bar-track { flex: 1; height: 6px; background: var(--ci-bg-inset); border-radius: 3px; overflow: hidden; }
    .queue-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .queue-bar-fill.high { background: #639922; }
    .queue-bar-fill.mid { background: #ef9f27; }
    .queue-bar-fill.low { background: #e24b4a; }
    .queue-dim-score { font-size: 12px; font-weight: 700; width: 22px; text-align: right; }
    .queue-dim-score.high { color: #639922; }
    .queue-dim-score.mid { color: #ef9f27; }
    .queue-dim-score.low { color: #e24b4a; }

    /* Segmented dimension toggle */
    .queue-dim-toggle { display: flex; margin: 8px 0 0; border: 1px solid var(--ci-border-default); border-radius: 8px; overflow: hidden; background: var(--ci-bg-raised); transition: border-radius 0.15s; }
    .queue-dim-toggle.has-active { border-radius: 8px 8px 0 0; }
    .queue-dim-toggle-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px; padding: 7px 3px; font-size: 10px; font-weight: 600; font-family: inherit; color: var(--ci-text-secondary); background: transparent; border: none; border-right: 1px solid var(--ci-border-subtle); cursor: pointer; transition: all 0.15s; user-select: none; white-space: nowrap; overflow: hidden; }
    .queue-dim-toggle-btn:last-child { border-right: none; }
    .queue-dim-toggle-btn:hover { background: var(--ci-bg-inset); }
    .queue-dim-toggle-btn.active { color: #fff; }
    .queue-dim-toggle-btn.active[data-dot="qual"]    { background: #2571C7; }
    .queue-dim-toggle-btn.active[data-dot="role"]    { background: #2e5a0c; }
    .queue-dim-toggle-btn.active[data-dot="culture"] { background: #5B53C5; }
    .queue-dim-toggle-btn.active[data-dot="company"] { background: #9A6210; }
    .queue-dim-toggle-btn.active[data-dot="comp"]    { background: #0A5440; }
    .queue-dim-toggle-btn.active .queue-dim-dot { box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }
    .queue-dim-toggle-btn .queue-dim-dot { width: 7px; height: 7px; }
    .queue-dim-toggle-score { font-size: 11px; font-weight: 800; opacity: 0.75; }
    .queue-dim-toggle-btn.active .queue-dim-toggle-score { opacity: 1; }

    /* Detail panels (one visible at a time) */
    .queue-dim-details { margin-top: 0; }
    .queue-dim-detail { display: none; background: var(--ci-bg-inset); border: 1px solid var(--ci-border-default); border-top: none; border-radius: 0 0 8px 8px; padding: 8px 12px; }
    .queue-dim-detail.active { display: block; }
    .queue-dim-detail-note { font-size: 12px; color: var(--ci-text-secondary); line-height: 1.5; padding: 4px 0; font-style: italic; }

    /* Math row */
    .queue-math-row { display: flex; justify-content: space-between; align-items: center; font-size: 11.5px; color: var(--ci-text-secondary); padding: 5px 10px; background: var(--ci-bg-inset); border-radius: 5px; margin-bottom: 8px; gap: 8px; }
    .queue-math-left { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .qmth-base { font-family: var(--ci-font-mono, monospace); font-weight: 600; color: var(--ci-text-secondary); }
    .qmth-pos  { font-family: var(--ci-font-mono, monospace); font-weight: 800; color: #16a34a; }
    .qmth-neg  { font-family: var(--ci-font-mono, monospace); font-weight: 800; color: #dc2626; }
    .qmth-eq   { color: var(--ci-text-secondary); }
    .qmth-result { font-weight: 700; color: var(--ci-text-primary); }
    .queue-math-right { font-size: 11px; font-weight: 600; color: var(--ci-text-secondary); white-space: nowrap; font-family: var(--ci-font-mono, monospace); }

    /* Flag columns — stacked by default, side-by-side with .horizontal */
    .queue-flag-cols { display: flex; flex-direction: column; gap: 6px; }
    .queue-flag-cols.horizontal { flex-direction: row; gap: 8px; }
    .queue-flag-cols.horizontal > div { flex: 1; min-width: 0; }
    .queue-flag-col-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .queue-flag-col-label.green { color: #3B6D11; }
    .queue-flag-col-label.red { color: #A32D2D; }
    .queue-flag-col-label.met { color: #3B6D11; }
    .queue-flag-col-label.partial { color: #854F0B; }

    /* Flag card — compact single-row layout */
    .queue-flag-card { border-radius: 6px; margin-bottom: 3px; overflow: hidden; }
    .queue-flag-card.green { background: #EAF3DE; border: 0.5px solid #C0DD97; }
    .queue-flag-card.red { background: #FCEBEB; border: 0.5px solid #F7C1C1; }
    .queue-flag-card.amber { background: #FAEEDA; border: 0.5px solid #FAC775; }
    .queue-flag-card.neutral { background: #f5f8fa; border: 0.5px solid #eef1f5; }
    .queue-flag-card-row { padding: 5px 8px; display: flex; align-items: center; gap: 5px; font-size: 12px; line-height: 1.3; }
    .queue-flag-card.green .queue-flag-card-row { color: #27500A; }
    .queue-flag-card.red .queue-flag-card-row { color: #791F1F; }
    .queue-flag-card.amber .queue-flag-card-row { color: #633806; }
    .queue-flag-card.neutral .queue-flag-card-row { color: var(--ci-text-tertiary); }
    .queue-flag-sign { font-weight: 700; font-size: 14px; flex-shrink: 0; width: 14px; text-align: center; }
    .queue-flag-text { font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .queue-flag-sev-pill { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 10px; background: rgba(0,0,0,0.06); color: var(--ci-text-secondary); flex-shrink: 0; }
    .queue-flag-impact { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 10px; flex-shrink: 0; }
    .queue-flag-impact.pos { background: rgba(54,179,126,0.12); color: #0F6E56; }
    .queue-flag-impact.neg { background: rgba(232,56,79,0.10); color: #A32D2D; }
    .queue-flag-settings-link { font-size: 11px; font-weight: 600; color: #378ADD; background: #E6F1FB; padding: 1px 8px; border-radius: 10px; text-decoration: none; white-space: nowrap; flex-shrink: 0; }
    .queue-flag-settings-link:hover { background: #D0E4F7; }
    .queue-flag-dismiss-btn { background: none; border: none; font-size: 14px; color: var(--ci-text-tertiary); cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; }
    .queue-flag-dismiss-btn:hover { color: #E8384F; }
    .queue-flag-evidence { padding: 3px 8px 3px 10px; margin: 0 8px 5px; font-size: 11px; font-style: italic; line-height: 1.35; border-left: 2px solid; border-radius: 2px; }
    .queue-flag-card.green .queue-flag-evidence { color: #3B6D11; border-color: #3B6D11; background: rgba(234,243,222,0.35); }
    .queue-flag-card.red .queue-flag-evidence { color: #791F1F; border-color: #c0392b; background: rgba(252,235,235,0.35); }
    .queue-flag-card.amber .queue-flag-evidence { color: #633806; border-color: #d97706; background: rgba(250,238,218,0.35); }
    .queue-flag-neutral-label { font-size: 9px; color: var(--ci-text-tertiary); font-style: italic; }
    /* Legacy classes (kept for backward compat if any old cards render) */
    .queue-flag-card-header { padding: 6px 10px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; line-height: 1.35; }
    .queue-flag-card-meta { padding: 0 10px 6px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    /* Collapse / expand */
    .queue-flags-overflow { /* JS toggles display:none/block */ }
    .queue-flags-more-btn { display: block; width: 100%; background: none; border: 1px dashed rgba(0,0,0,0.12); border-radius: 6px; padding: 5px 0; margin: 2px 0 4px; font-size: 12px; font-weight: 600; color: var(--ci-text-secondary); cursor: pointer; text-align: center; }
    .queue-flags-more-btn:hover { background: rgba(0,0,0,0.03); color: var(--ci-text-primary); }

    /* Qualification met/partial/unmet cards */
    .queue-qual-card { border-radius: 4px; margin-bottom: 2px; overflow: hidden; padding: 3px 8px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .queue-qual-card.met { background: #EAF3DE; border: 0.5px solid #C0DD97; }
    .queue-qual-card.partial { background: #FAEEDA; border: 0.5px solid #FAC775; }
    .queue-qual-card.unmet { background: #FCEBEB; border: 0.5px solid #F7C1C1; }
    .queue-qual-card.unknown { background: #f5f8fa; border: 0.5px solid #eef1f5; }
    .queue-qual-icon { width: 14px; height: 14px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; flex-shrink: 0; }
    .queue-qual-icon.met { background: #36B37E; color: #fff; }
    .queue-qual-icon.partial { background: #F5A623; color: #fff; }
    .queue-qual-icon.unmet { background: #E8384F; color: #fff; }
    .queue-qual-icon.unknown { background: #ccc; color: #fff; }
    .queue-qual-title { font-size: 12px; font-weight: 600; line-height: 1.2; }
    .queue-qual-card.met .queue-qual-title { color: #27500A; }
    .queue-qual-card.partial .queue-qual-title { color: #633806; }
    .queue-qual-card.unmet .queue-qual-title { color: #791F1F; }
    .queue-qual-card.unknown .queue-qual-title { color: var(--ci-text-tertiary); }
    .queue-qual-status { font-size: 10px; font-style: italic; margin-top: 0; line-height: 1.2; }
    .queue-qual-card.met .queue-qual-status { color: #3B6D11; }
    .queue-qual-card.partial .queue-qual-status { color: #854F0B; }
    .queue-qual-card.unmet .queue-qual-status { color: #A32D2D; }
    .queue-qual-card.unknown .queue-qual-status { color: var(--ci-text-tertiary); }
    .queue-qual-sources { display: inline-flex; gap: 3px; flex-wrap: wrap; }
    .queue-qual-source-tag { font-size: 8px; font-weight: 700; padding: 1px 6px; border-radius: 10px; background: rgba(55,138,221,0.12); color: #378ADD; }
    .queue-qual-evidence { font-size: 10px; font-style: italic; line-height: 1.3; margin-top: 0; padding: 0; border-radius: 0; background: none !important; }
    .queue-qual-evidence::before { content: '— '; font-style: normal; }
    .queue-qual-card.met .queue-qual-evidence { color: #3B6D11; }
    .queue-qual-card.partial .queue-qual-evidence { color: #633806; }
    .queue-qual-card.unmet .queue-qual-evidence { color: #791F1F; }
    .queue-qual-correct-btn { font-size: 10px; font-weight: 600; color: #378ADD; background: #E6F1FB; padding: 1px 8px; border-radius: 10px; border: none; cursor: pointer; margin-top: 0; }
    .queue-qual-correct-btn:hover { background: #D0E4F7; }

    /* Comp mini cards */
    .queue-comp-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
    .queue-comp-cards.single { grid-template-columns: 1fr; }
    .queue-comp-card { padding: 7px 10px; border-radius: 6px; background: #fff; border: 0.5px solid var(--ci-border-subtle); }
    .queue-comp-card-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ci-text-tertiary); margin-bottom: 2px; }
    .queue-comp-card-value { font-size: 14px; font-weight: 700; color: var(--ci-text-primary); }
    .queue-comp-card-verdict { font-size: 10px; margin-top: 2px; }
    .queue-comp-card-verdict.above { color: #0F6E56; }
    .queue-comp-card-verdict.at { color: #854F0B; }
    .queue-comp-card-verdict.below { color: #A32D2D; }
    .queue-comp-card-verdict.unknown { color: var(--ci-text-tertiary); }

    /* Compact qualification lines (new format) */
    .queue-qual-list { display: flex; flex-direction: column; gap: 1px; }
    .queue-qual-line { display: flex; align-items: center; gap: 5px; padding: 2px 4px; font-size: 11px; line-height: 1.3; border-radius: 3px; }
    .queue-qual-line.met { color: #27500A; }
    .queue-qual-line.partial { color: #633806; }
    .queue-qual-line.unmet { color: #791F1F; }
    .queue-qual-line.unknown { color: var(--ci-text-tertiary); opacity: 0.75; }
    .queue-qual-line-icon { font-size: 10px; font-weight: 700; flex-shrink: 0; width: 14px; text-align: center; }
    .queue-qual-line-icon.met { color: #36B37E; }
    .queue-qual-line-icon.partial { color: #F5A623; }
    .queue-qual-line-icon.unmet { color: #E8384F; }
    .queue-qual-line-icon.unknown { color: var(--ci-text-tertiary); }
    .queue-qual-line-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .queue-qual-line-src { font-size: 8px; font-weight: 700; padding: 0 5px; border-radius: 8px; background: rgba(55,138,221,0.10); color: #378ADD; flex-shrink: 0; }
    .queue-qual-line.expandable { cursor: pointer; flex-wrap: wrap; }
    .queue-qual-line.expandable:hover { background: rgba(0,0,0,0.03); }
    .queue-qual-line-evidence { display: none; width: 100%; font-size: 10px; color: var(--ci-text-secondary); font-style: italic; padding: 2px 0 2px 19px; line-height: 1.35; }
    .queue-qual-line.expanded .queue-qual-line-evidence { display: block; }

    /* Inline comp summary (new format) */
    .queue-comp-inline { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--ci-text-primary); padding: 4px 0 2px; flex-wrap: wrap; }
    .queue-comp-inline-verdict { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; margin-left: 2px; }
    .queue-comp-inline-verdict.above { background: rgba(54,179,126,0.12); color: #0F6E56; }
    .queue-comp-inline-verdict.at { background: rgba(245,166,35,0.12); color: #854F0B; }
    .queue-comp-inline-verdict.below { background: rgba(232,56,79,0.10); color: #A32D2D; }
    .queue-comp-inline-verdict.unknown { background: var(--ci-bg-inset); color: var(--ci-text-tertiary); }
    .queue-comp-sep { color: var(--ci-text-tertiary); font-weight: 400; margin: 0 2px; }

    /* Inline rationale in detail panel */
    .queue-dim-inline-rationale { font-size: 11.5px; color: var(--ci-text-secondary); line-height: 1.4; display: block; }

    /* Drawer note */
    .queue-drawer-note { font-size: 11px; font-style: italic; color: var(--ci-text-tertiary); margin-top: 8px; padding-top: 6px; border-top: 0.5px solid var(--ci-border-subtle); }
    .queue-drawer-rationale { font-size: 12px; color: var(--ci-text-secondary); line-height: 1.5; margin-bottom: 8px; padding: 6px 10px; background: #fff; border-radius: 4px; border-left: 2px solid var(--ci-border-default); }

    /* Total formula row (at bottom of breakdown) */
    .queue-total-formula { display: flex; align-items: center; flex-wrap: wrap; gap: 4px 6px; padding: 8px 12px; background: var(--ci-bg-inset); border: 1px solid var(--ci-border-subtle); border-radius: 6px; margin-top: 6px; margin-bottom: 8px; }
    .qf-chip { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; }
    .qf-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .qf-sep  { font-size: 11px; color: var(--ci-text-tertiary); font-weight: 400; }
    .qf-total { font-family: var(--ci-font-mono, monospace); font-size: 12px; font-weight: 700; color: var(--ci-text-primary); }
    .qf-score { font-family: var(--ci-font-mono, monospace); font-size: 13px; font-weight: 800; color: var(--ci-text-primary); }
    /* Role brief section */
    .qc-role-brief-section { margin: 6px 0 2px; padding: 10px 14px; background: var(--ci-bg-surface); border: 1px solid var(--ci-border-subtle); border-radius: 8px; }
    .qc-role-brief-title { font-size: 10px; font-weight: 700; color: var(--ci-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .qc-role-brief-summary { font-size: 12px; line-height: 1.6; color: var(--ci-text-primary); margin-bottom: 6px; }
    .qc-role-brief-row { font-size: 12px; line-height: 1.5; color: var(--ci-text-secondary); margin-bottom: 3px; }

    /* More info link */
    .qc-more {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 11px; color: var(--ci-text-tertiary); cursor: pointer;
      padding: 6px; border-top: 1px solid var(--ci-border-subtle); transition: all 0.15s;
    }
    .qc-more:hover { color: var(--ci-accent-primary); background: var(--ci-accent-primary-soft); }

    /* Actions */
    .queue-actions { padding: 8px 20px 12px; display: flex; gap: 12px; justify-content: center; }
    .queue-action-btn {
      flex: 1; max-width: 200px; padding: 10px 20px; border: none; border-radius: var(--ci-radius-md);
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.15s;
    }
    .queue-action-btn.pass {
      background: var(--ci-bg-inset); color: var(--ci-text-secondary); border: 1px solid var(--ci-border-default);
    }
    .queue-action-btn.pass:hover { background: var(--ci-accent-red-soft); color: var(--ci-accent-red); border-color: var(--ci-accent-red); }
    .queue-action-btn.interested {
      background: var(--ci-accent-primary); color: #fff; box-shadow: 0 2px 8px rgba(252,99,107,0.25);
    }
    .queue-action-btn.interested:hover { background: var(--ci-accent-primary-hover); box-shadow: 0 4px 16px rgba(252,99,107,0.3); transform: translateY(-1px); }
    .queue-action-btn .kbd {
      font-size: 10px; opacity: 0.6; background: rgba(255,255,255,0.2); padding: 1px 5px;
      border-radius: 3px; font-family: var(--ci-font-mono);
    }
    .queue-action-btn.pass .kbd { background: rgba(0,0,0,0.06); }

    /* Inline position + rescore row */
    .queue-nav {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 5px 20px 0;
    }
    .queue-nav-pos { font-size: 13px; color: var(--ci-text-tertiary); font-weight: 600; }
    .queue-rescore-btn {
      background: none; border: 1px solid var(--ci-border-default); color: var(--ci-text-tertiary);
      font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: var(--ci-radius-sm);
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .queue-rescore-btn:hover { border-color: var(--ci-accent-primary); color: var(--ci-accent-primary); }
    .queue-rescrape-btn {
      background: none; border: 1px solid var(--ci-border-default); color: var(--ci-text-tertiary);
      font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: var(--ci-radius-sm);
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .queue-rescrape-btn:hover:not(:disabled) { border-color: #0ea5e9; color: #0ea5e9; }
    .queue-rescrape-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .rescore-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--ci-border-default); border-top-color: var(--ci-accent-primary); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Coop thinking overlay — CSS lives in design-tokens.css (shared) */

    /* Swipe animation */
    .queue-card { cursor: grab; user-select: none; }
    .queue-card:active { cursor: grabbing; }
    .queue-card.swipe-left  { animation: swipeLeft  0.35s cubic-bezier(0.4, 0, 0.8, 0.6) forwards; }
    .queue-card.swipe-right { animation: swipeRight 0.35s cubic-bezier(0.4, 0, 0.8, 0.6) forwards; }
    @keyframes swipeLeft  { to { opacity: 0; transform: translateX(-140%) rotate(-12deg) scale(0.88); } }
    @keyframes swipeRight { to { opacity: 0; transform: translateX(140%)  rotate(12deg)  scale(0.88); } }

    /* In overlay (iframe): hide redundant header, fill space, scroll naturally */
    body.in-overlay .header { display: none; }
    body.in-overlay { background: var(--ci-bg-page); }
    body.in-overlay .queue-main { padding: 24px 80px; overflow-y: auto; align-items: flex-start; }
    .overlay-back-btn {
      display: none; position: fixed; top: 12px; left: 16px; z-index: 20;
      padding: 6px 14px; font-size: 13px; font-weight: 600; font-family: inherit;
      color: var(--ci-text-secondary); background: var(--ci-bg-overlay);
      border: 1px solid var(--ci-border-default); border-radius: var(--ci-radius-full);
      box-shadow: var(--ci-shadow-sm); cursor: pointer; transition: all 0.15s;
    }
    .overlay-back-btn:hover { color: var(--ci-accent-primary); border-color: var(--ci-accent-primary); }
    body.in-overlay .overlay-back-btn { display: flex; align-items: center; gap: 6px; }
    body.in-overlay .queue-card.swipe-left  { animation: swipeLeftOverlay  0.35s cubic-bezier(0.4, 0, 0.8, 0.6) forwards; }
    body.in-overlay .queue-card.swipe-right { animation: swipeRightOverlay 0.35s cubic-bezier(0.4, 0, 0.8, 0.6) forwards; }
    @keyframes swipeLeftOverlay  { to { opacity: 0; transform: translateX(-60px) scale(0.82) rotate(-10deg); } }
    @keyframes swipeRightOverlay { to { opacity: 0; transform: translateX(60px)  scale(0.82) rotate(10deg);  } }

    /* Swipe overlay labels */
    .swipe-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; }
    .swipe-label {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 28px; font-weight: 900; letter-spacing: 0.06em; padding: 10px 24px;
      border-radius: 12px; border: 4px solid; opacity: 0; transition: opacity 0.05s;
    }
    .swipe-label.pass { left: 24px; color: var(--ci-accent-red); border-color: var(--ci-accent-red); background: rgba(232,56,79,0.08); }
    .swipe-label.interested { right: 24px; color: var(--ci-accent-teal); border-color: var(--ci-accent-teal); background: rgba(54,179,126,0.08); }

    /* Scored timestamp */
    .qc-scored-at { font-size: 10px; color: var(--ci-text-tertiary); margin-top: 4px; }
    .qc-company-blurb { font-size: 11px; color: var(--ci-text-secondary); line-height: 1.4; margin-top: 6px; max-width: 360px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Links — now lives inside qc-info in the header */
    .qc-links { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

    /* Side-by-side row: Quick Take (left, stretches to match bar height) + Bars only (right) */
    .qc-take-bars-row { display: grid; grid-template-columns: 3fr 2fr; gap: 12px; align-items: stretch; margin-bottom: 8px; }
    .qc-take-col { min-width: 0; display: flex; flex-direction: column; }
    .qc-take-col .queue-coop-take { flex: 1; margin-bottom: 0; }
    .qc-bars-col { min-width: 0; }

    /* Detail section (toggle tabs + panels + formula) — full width, below the row */
    .qc-bars-detail { margin-bottom: 8px; }

    /* Flag dismiss */
    .qc-flag { position: relative; }
    .qc-flag.dismissed { opacity: 0.4; }
    .qc-flag-dismiss {
      background: none; border: none; color: var(--ci-border-strong); cursor: pointer;
      font-size: 13px; padding: 0 2px; margin-left: 4px; flex-shrink: 0; line-height: 1;
      opacity: 0; transition: opacity 0.12s;
    }
    .qc-flag:hover .qc-flag-dismiss { opacity: 1; }
    .qc-flag-dismiss:hover { color: var(--ci-accent-primary); }
    .qc-flag-config { text-decoration: none; font-size: 11px; color: var(--ci-border-strong); margin-left: 4px; opacity: 0; transition: opacity 0.12s; }
    .qc-flag:hover .qc-flag-config { opacity: 1; }
    .qc-flag-config:hover { color: var(--ci-accent-primary); }

    /* Job data corrections */
    .qc-corrections { padding: 0 24px 12px; }
    .qc-correct-toggle { background: none; border: none; color: var(--ci-text-tertiary); font-size: 12px; cursor: pointer; font-family: inherit; padding: 4px 0; transition: color 0.12s; }
    .qc-correct-toggle:hover { color: var(--ci-accent-primary); }
    .qc-correct-form { margin-top: 8px; padding: 12px; background: var(--ci-bg-inset); border-radius: var(--ci-radius-sm); border: 1px solid var(--ci-border-subtle); }
    .qc-correct-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .qc-correct-row label { font-size: 11px; font-weight: 600; color: var(--ci-text-secondary); width: 110px; flex-shrink: 0; }
    .qc-correct-row select, .qc-correct-row input { flex: 1; font-size: 12px; padding: 5px 8px; border: 1px solid var(--ci-border-default); border-radius: var(--ci-radius-sm); font-family: inherit; background: var(--ci-bg-raised); color: var(--ci-text-primary); }
    .qc-correct-save { margin-top: 4px; font-size: 11px; padding: 6px 14px; border: none; border-radius: var(--ci-radius-sm); background: var(--ci-accent-primary); color: #fff; cursor: pointer; font-family: inherit; font-weight: 600; }
  </style>
