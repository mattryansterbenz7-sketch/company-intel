<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="design-tokens.css">
  <title>CompanyIntel — Scoring Queue</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--ci-font-family); background: var(--ci-bg-base); color: var(--ci-text-primary); min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header {
      background: var(--ci-bg-header); color: var(--ci-text-on-dark); padding: 14px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .header-back {
      color: var(--ci-text-on-dark-muted); text-decoration: none; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px; transition: color 0.15s;
    }
    .header-back:hover { color: var(--ci-text-on-dark); }
    .header-title { font-size: 16px; font-weight: 700; }
    .header-title span { color: var(--ci-accent-primary); }
    .header-count {
      margin-left: auto; font-size: 13px; color: var(--ci-text-on-dark-muted);
      background: rgba(255,255,255,0.08); padding: 4px 12px; border-radius: var(--ci-radius-full);
    }

    /* Main */
    .queue-main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 32px 40px; }
    .queue-empty {
      text-align: center; padding: 60px 24px; max-width: 400px;
    }
    .queue-empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .queue-empty-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .queue-empty-sub { font-size: 14px; color: var(--ci-text-secondary); }

    /* Card */
    .queue-card {
      width: 100%; max-width: 900px; background: var(--ci-bg-raised);
      border: 1px solid var(--ci-border-default); border-radius: var(--ci-radius-lg);
      box-shadow: var(--ci-shadow-md); overflow: hidden;
      animation: cardIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Card header */
    .qc-header { padding: 20px 24px 16px; display: flex; gap: 16px; align-items: flex-start; }
    .qc-score {
      width: 56px; height: 56px; border-radius: var(--ci-radius-full);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-weight: 800; flex-shrink: 0; border: 3px solid;
    }
    .qc-score.green { border-color: #36B37E; color: #0F6E56; background: rgba(54,179,126,0.08); }
    .qc-score.amber { border-color: #F5A623; color: #854F0B; background: rgba(245,166,35,0.08); }
    .qc-score.red { border-color: #E8384F; color: #A32D2D; background: rgba(232,56,79,0.06); }
    .qc-score-num { font-size: 20px; line-height: 1; }
    .qc-score-den { font-size: 10px; opacity: 0.6; }
    .qc-info { flex: 1; min-width: 0; }
    .qc-company { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .qc-company-favicon { width: 20px; height: 20px; border-radius: 4px; }
    .qc-title { font-size: 14px; color: var(--ci-text-secondary); margin-top: 2px; }
    .qc-meta { font-size: 13px; color: var(--ci-text-tertiary); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
    .qc-meta-chip {
      background: var(--ci-bg-inset); padding: 2px 8px; border-radius: var(--ci-radius-full);
      font-size: 11px; font-weight: 600;
    }

    /* Card body */
    .qc-body { padding: 0 24px 16px; }
    .qc-summary { font-size: 13px; color: var(--ci-text-secondary); line-height: 1.55; font-style: italic; padding: 12px 16px; background: var(--ci-bg-inset); border-radius: var(--ci-radius-sm); margin-bottom: 16px; }
    .qc-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ci-text-tertiary); margin-bottom: 8px; }

    /* Flags */
    .qc-flags { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
    .qc-flag-col { display: flex; flex-direction: column; gap: 6px; }
    .qc-flag-heading { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .qc-flag-heading.green { color: var(--ci-accent-teal); }
    .qc-flag-heading.red { color: var(--ci-accent-red); }
    .qc-flag { font-size: 12px; line-height: 1.4; color: var(--ci-text-secondary); display: flex; gap: 6px; }
    .qc-flag-dot { flex-shrink: 0; margin-top: 4px; }

    /* Qualification */
    .qc-qual { margin-bottom: 16px; }
    .qc-qual-text { font-size: 13px; color: var(--ci-text-secondary); line-height: 1.5; }
    .qc-qual-score { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: var(--ci-radius-full); margin-top: 6px; }
    .qc-qual-score.high { background: rgba(54,179,126,0.1); color: #0F6E56; }
    .qc-qual-score.mid { background: rgba(245,166,35,0.1); color: #854F0B; }
    .qc-qual-score.low { background: rgba(232,56,79,0.08); color: #A32D2D; }

    /* Score breakdown bars */
    .qc-breakdown { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .qc-bar-row { display: flex; align-items: center; gap: 8px; }
    .qc-bar-label { font-size: 11px; color: var(--ci-text-tertiary); width: 90px; flex-shrink: 0; text-align: right; }
    .qc-bar-track { flex: 1; height: 6px; background: var(--ci-bg-inset); border-radius: 3px; overflow: hidden; }
    .qc-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .qc-bar-val { font-size: 11px; font-weight: 700; width: 24px; text-align: right; }

    /* More info link */
    .qc-more {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 12px; color: var(--ci-text-tertiary); cursor: pointer;
      padding: 8px; border-top: 1px solid var(--ci-border-subtle); transition: all 0.15s;
    }
    .qc-more:hover { color: var(--ci-accent-primary); background: var(--ci-accent-primary-soft); }

    /* Actions */
    .queue-actions { padding: 20px 24px 24px; display: flex; gap: 12px; justify-content: center; }
    .queue-action-btn {
      flex: 1; max-width: 200px; padding: 14px 24px; border: none; border-radius: var(--ci-radius-md);
      font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.15s;
    }
    .queue-action-btn.pass {
      background: var(--ci-bg-inset); color: var(--ci-text-secondary); border: 1px solid var(--ci-border-default);
    }
    .queue-action-btn.pass:hover { background: var(--ci-accent-red-soft); color: var(--ci-accent-red); border-color: var(--ci-accent-red); }
    .queue-action-btn.interested {
      background: var(--ci-accent-primary); color: #fff; box-shadow: 0 2px 8px rgba(240,106,82,0.25);
    }
    .queue-action-btn.interested:hover { background: var(--ci-accent-primary-hover); box-shadow: 0 4px 16px rgba(240,106,82,0.3); transform: translateY(-1px); }
    .queue-action-btn .kbd {
      font-size: 10px; opacity: 0.6; background: rgba(255,255,255,0.2); padding: 1px 5px;
      border-radius: 3px; font-family: var(--ci-font-mono);
    }
    .queue-action-btn.pass .kbd { background: rgba(0,0,0,0.06); }

    /* Navigation + rescore */
    .queue-nav {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      padding: 10px 24px 0;
    }
    .queue-nav-btn {
      background: none; border: 1px solid var(--ci-border-default); color: var(--ci-text-secondary);
      width: 36px; height: 36px; border-radius: var(--ci-radius-full); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      transition: all 0.15s;
    }
    .queue-nav-btn:hover { border-color: var(--ci-accent-primary); color: var(--ci-accent-primary); background: var(--ci-accent-primary-soft); }
    .queue-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .queue-nav-btn:disabled:hover { border-color: var(--ci-border-default); color: var(--ci-text-secondary); background: none; }
    .queue-nav-pos { font-size: 13px; color: var(--ci-text-tertiary); font-weight: 600; min-width: 50px; text-align: center; }
    .queue-rescore-btn {
      background: none; border: 1px solid var(--ci-border-default); color: var(--ci-text-tertiary);
      font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: var(--ci-radius-sm);
      cursor: pointer; font-family: inherit; transition: all 0.15s; margin-left: auto;
    }
    .queue-rescore-btn:hover { border-color: var(--ci-accent-primary); color: var(--ci-accent-primary); }
    .rescore-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--ci-border-default); border-top-color: var(--ci-accent-primary); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Swipe animation */
    .queue-card { cursor: grab; user-select: none; }
    .queue-card:active { cursor: grabbing; }
    .queue-card.swipe-left { animation: swipeLeft 0.3s ease forwards; }
    .queue-card.swipe-right { animation: swipeRight 0.3s ease forwards; }
    @keyframes swipeLeft { to { opacity: 0; transform: translateX(-120%) rotate(-8deg); } }
    @keyframes swipeRight { to { opacity: 0; transform: translateX(120%) rotate(8deg); } }

    /* Swipe overlay labels */
    .swipe-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; }
    .swipe-label {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 28px; font-weight: 900; letter-spacing: 0.06em; padding: 10px 24px;
      border-radius: 12px; border: 4px solid; opacity: 0; transition: opacity 0.05s;
    }
    .swipe-label.pass { left: 24px; color: var(--ci-accent-red); border-color: var(--ci-accent-red); background: rgba(232,56,79,0.08); }
    .swipe-label.interested { right: 24px; color: var(--ci-accent-teal); border-color: var(--ci-accent-teal); background: rgba(54,179,126,0.08); }

    /* Scored timestamp */
    .qc-scored-at { font-size: 10px; color: var(--ci-text-tertiary); margin-top: 6px; }

    /* Links row */
    .qc-links { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 24px 12px; }

    /* Flag dismiss */
    .qc-flag { position: relative; }
    .qc-flag.dismissed { opacity: 0.4; }
    .qc-flag-dismiss {
      background: none; border: none; color: var(--ci-border-strong); cursor: pointer;
      font-size: 13px; padding: 0 2px; margin-left: 4px; flex-shrink: 0; line-height: 1;
      opacity: 0; transition: opacity 0.12s;
    }
    .qc-flag:hover .qc-flag-dismiss { opacity: 1; }
    .qc-flag-dismiss:hover { color: var(--ci-accent-primary); }
    .qc-flag-config { text-decoration: none; font-size: 11px; color: var(--ci-border-strong); margin-left: 4px; opacity: 0; transition: opacity 0.12s; }
    .qc-flag:hover .qc-flag-config { opacity: 1; }
    .qc-flag-config:hover { color: var(--ci-accent-primary); }

    /* Job data corrections */
    .qc-corrections { padding: 0 24px 12px; }
    .qc-correct-toggle { background: none; border: none; color: var(--ci-text-tertiary); font-size: 12px; cursor: pointer; font-family: inherit; padding: 4px 0; transition: color 0.12s; }
    .qc-correct-toggle:hover { color: var(--ci-accent-primary); }
    .qc-correct-form { margin-top: 8px; padding: 12px; background: var(--ci-bg-inset); border-radius: var(--ci-radius-sm); border: 1px solid var(--ci-border-subtle); }
    .qc-correct-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .qc-correct-row label { font-size: 11px; font-weight: 600; color: var(--ci-text-secondary); width: 110px; flex-shrink: 0; }
    .qc-correct-row select, .qc-correct-row input { flex: 1; font-size: 12px; padding: 5px 8px; border: 1px solid var(--ci-border-default); border-radius: var(--ci-radius-sm); font-family: inherit; background: var(--ci-bg-raised); color: var(--ci-text-primary); }
    .qc-correct-save { margin-top: 4px; font-size: 11px; padding: 6px 14px; border: none; border-radius: var(--ci-radius-sm); background: var(--ci-accent-primary); color: #fff; cursor: pointer; font-family: inherit; font-weight: 600; }
  </style>
</head>
<body>
  <div class="header">
    <a class="header-back" id="back-btn" href="#">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2L4 8l6 6"/></svg>
      Pipeline
    </a>
    <div class="header-title" style="display:flex;align-items:center;gap:10px;">
      <svg width="28" height="28" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="border-radius:50%;flex-shrink:0;"><circle cx="50" cy="50" r="50" fill="#E8E5E0"/><clipPath id="cq"><circle cx="50" cy="50" r="48"/></clipPath><g clip-path="url(#cq)"><ellipse cx="50" cy="96" rx="42" ry="23" fill="#3D5468"/><rect x="43" y="73" width="14" height="12" rx="3" fill="#E5BF9A"/><path d="M28 45Q28 30 38 24Q50 20 62 24Q72 30 72 45Q72 56 65 64Q59 70 50 72Q41 70 35 64Q28 56 28 45Z" fill="#F0CDA0"/><path d="M27 42Q27 20 50 14Q73 20 73 42L71 36Q69 20 50 17Q31 20 29 36Z" fill="#7A5C3A"/><ellipse cx="41" cy="44" rx="4.5" ry="4.5" fill="white"/><circle cx="41.5" cy="44.5" r="2.5" fill="#4A8DB8"/><ellipse cx="59" cy="44" rx="4.5" ry="4.5" fill="white"/><circle cx="59.5" cy="44.5" r="2.5" fill="#4A8DB8"/><path d="M40 58Q45 65 50 66Q55 65 60 58" fill="white" stroke="#8B6B4A" stroke-width="0.8"/></g></svg>
      <span><span>Coop's</span> Scoring Queue</span>
    </div>
    <div class="header-count" id="queue-count">0 remaining</div>
  </div>

  <div class="queue-main" id="queue-main">
    <div class="queue-empty">
      <div class="queue-empty-icon">✓</div>
      <div class="queue-empty-title">Queue is clear</div>
      <div class="queue-empty-sub">New opportunities will appear here when saved</div>
    </div>
  </div>

  <script src="sounds.js"></script>
  <script src="queue.js"></script>
</body>
</html>
