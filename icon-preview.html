<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coop Icon Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F6F8F9; font-family: -apple-system, sans-serif; padding: 48px; }
  h1 { font-size: 13px; font-weight: 600; color: #0A0B0D; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 36px; }
  .row { display: flex; gap: 64px; margin-bottom: 48px; }
  .option { display: flex; flex-direction: column; gap: 24px; }
  .option-label { font-size: 13px; font-weight: 600; color: #0A0B0D; margin-bottom: 4px; }
  .option-sub { font-size: 12px; color: #6F7782; margin-bottom: 12px; }
  .sizes { display: flex; gap: 20px; align-items: flex-end; }
  .size-slot { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .size-slot span { font-size: 11px; color: #8A8E94; }
  .on-dark { background: #151B26; padding: 20px 24px; border-radius: 12px; display: flex; gap: 20px; align-items: center; margin-top: 16px; }
  .on-dark span { font-size: 11px; color: #A3AEBE; }
  .divider { width: 1px; background: #E0E4E8; margin: 0 16px; }
</style>
</head>
<body>
<h1>Coop — Icon Options</h1>
<div class="row">

  <!-- Option A: Bird -->
  <div class="option">
    <div>
      <div class="option-label">A — Swallow</div>
      <div class="option-sub">Geometric bird, front view, wings spread</div>
    </div>
    <div class="sizes">
      <div class="size-slot">
        <img src="icon-a.svg" width="128" height="128"/>
        <span>128px</span>
      </div>
      <div class="size-slot">
        <img src="icon-a.svg" width="48" height="48"/>
        <span>48px</span>
      </div>
      <div class="size-slot">
        <img src="icon-a.svg" width="16" height="16"/>
        <span>16px</span>
      </div>
    </div>
    <div class="on-dark">
      <img src="icon-a.svg" width="32" height="32"/>
      <img src="icon-a.svg" width="20" height="20"/>
      <span>on nav dark</span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Option B: Nest + Egg -->
  <div class="option">
    <div>
      <div class="option-label">B — Nest</div>
      <div class="option-sub">Egg in a nest — literal "coop", minimal</div>
    </div>
    <div class="sizes">
      <div class="size-slot">
        <img src="icon-b.svg" width="128" height="128"/>
        <span>128px</span>
      </div>
      <div class="size-slot">
        <img src="icon-b.svg" width="48" height="48"/>
        <span>48px</span>
      </div>
      <div class="size-slot">
        <img src="icon-b.svg" width="16" height="16"/>
        <span>16px</span>
      </div>
    </div>
    <div class="on-dark">
      <img src="icon-b.svg" width="32" height="32"/>
      <img src="icon-b.svg" width="20" height="20"/>
      <span>on nav dark</span>
    </div>
  </div>

</div>
</body>
</html>
