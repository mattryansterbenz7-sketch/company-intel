<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CompanyIntel — Data Pipeline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f8fa; color: #33475b; min-height: 100vh; font-size: 14px; }

    .header { background: #2d3e50; padding: 16px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #1a2c3a; }
    .logo { font-size: 18px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.01em; text-decoration: none; }
    .logo span { color: #FF7A59; }
    .logo .slash { font-weight: 400; color: #7c98b6; font-size: 14px; }
    .header-back { color: #b0c1d4; font-size: 13px; font-weight: 600; padding: 7px 14px; border: 1px solid #4a6580; border-radius: 8px; background: rgba(255,255,255,0.08); cursor: pointer; transition: all 0.15s; font-family: inherit; text-decoration: none; }
    .header-back:hover { color: #fff; border-color: #7c98b6; }

    .page { max-width: 1400px; margin: 0 auto; padding: 36px 40px 60px; }
    .page-title { font-size: 26px; font-weight: 800; color: #2d3e50; letter-spacing: -0.02em; margin-bottom: 6px; }
    .page-subtitle { font-size: 14px; color: #7c98b6; margin-bottom: 32px; line-height: 1.6; }

    /* ── Shared Settings Sidebar ── */
    .settings-layout { display: flex; min-height: 100vh; }
    .settings-sidebar {
      width: 180px; flex-shrink: 0; background: #f5f8fa; border-right: 0.5px solid #e2e8f0;
      padding: 20px 0; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column;
    }
    .settings-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 8px; }
    .settings-nav-item {
      display: block; padding: 8px 14px; font-size: 13px; font-weight: 500; color: #516f90;
      text-decoration: none; border-radius: 6px; border-left: 2px solid transparent; transition: all 0.12s;
    }
    .settings-nav-item:hover { background: rgba(0,0,0,0.04); color: #2d3e50; }
    .settings-nav-item.active { background: #fff; color: #2d3e50; font-weight: 600; border-left-color: #FF7A59; }
    .settings-nav-divider { height: 1px; background: #e2e8f0; margin: 10px 14px; }
    .settings-content { flex: 1; min-width: 0; }

    /* ── Pipeline Settings ── */
    .pipeline-subsection { margin-bottom: 20px; }
    .pipeline-sub-title { font-size: 14px; font-weight: 700; color: #2d3e50; margin-bottom: 4px; }
    .pipeline-sub-desc { font-size: 12px; color: #7c98b6; margin-bottom: 10px; }
    .pipeline-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: #fff; border: 1px solid #eaf0f6; border-radius: 6px; margin-bottom: 4px; }
    .pipeline-row.disabled { opacity: 0.4; }
    .pipeline-drag { cursor: grab; color: #b0c1d4; font-size: 14px; flex-shrink: 0; }
    .pipeline-name { font-size: 13px; font-weight: 600; color: #2d3e50; }
    .pipeline-desc { font-size: 11px; color: #7c98b6; }
    .pipeline-status { display: flex; align-items: center; gap: 4px; margin-left: auto; font-size: 11px; }
    .pipeline-cost { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; }
    .pipeline-cost.cheap { background: #d1fae5; color: #065f46; }
    .pipeline-cost.expensive { background: #fee2e2; color: #991b1b; }
    .pipeline-toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .pipeline-toggle input { opacity: 0; width: 0; height: 0; }
    .pipeline-toggle-track { position: absolute; inset: 0; background: #dfe3eb; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
    .pipeline-toggle-track::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .pipeline-toggle input:checked + .pipeline-toggle-track { background: #22c55e; }
    .pipeline-toggle input:checked + .pipeline-toggle-track::before { transform: translateX(16px); }
    .pipeline-model-select { font-size: 12px; border: 1px solid #dfe3eb; border-radius: 4px; padding: 3px 6px; font-family: inherit; color: #33475b; background: #fff; }
    .pipeline-stepper { display: flex; align-items: center; gap: 0; }
    .pipeline-stepper button { width: 24px; height: 24px; border: 1px solid #dfe3eb; background: #fff; color: #33475b; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .pipeline-stepper button:first-child { border-radius: 4px 0 0 4px; }
    .pipeline-stepper button:last-child { border-radius: 0 4px 4px 0; }
    .pipeline-stepper span { width: 28px; height: 24px; border-top: 1px solid #dfe3eb; border-bottom: 1px solid #dfe3eb; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #2d3e50; }
    .pipeline-counts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pipeline-count-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: #fff; border: 1px solid #eaf0f6; border-radius: 6px; }
    .pipeline-count-label { font-size: 12px; color: #33475b; }
    .pipeline-cascade-arrow { text-align: center; font-size: 10px; color: #b0c1d4; padding: 2px 0; }
    .pipeline-warn { font-size: 11px; color: #d97706; background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); border-radius: 6px; padding: 6px 10px; margin-top: 8px; }
  </style>
</head>
<body>

<div class="header">
  <a class="logo" href="saved.html" style="text-decoration:none">Company<span>Intel</span> <span class="slash">/ Data Pipeline</span></a>
  <a class="header-back" href="saved.html">&larr; Back to Saved</a>
</div>

<div class="settings-layout">
  <nav class="settings-sidebar">
    <div class="settings-nav">
      <a class="settings-nav-item" href="preferences.html">Career OS</a>
      <a class="settings-nav-item" href="integrations.html">Integrations</a>
      <a class="settings-nav-item active" href="pipeline.html">Data Pipeline</a>
      <div class="settings-nav-divider"></div>
      <a class="settings-nav-item" href="docs.html" target="_blank">Documentation</a>
    </div>
  </nav>
  <div class="settings-content">

    <div class="page">
      <div class="page-title">Data Pipeline</div>
      <div class="page-subtitle">Control how CompanyIntel researches companies, scores jobs, and routes AI tasks.</div>
      <div id="pipeline-body"></div>
    </div>

  </div><!-- /.settings-content -->
</div><!-- /.settings-layout -->

<script src="pipeline.js"></script>

</body>
</html>
